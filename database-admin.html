<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据库管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.25);
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }
    .header h1 { color: #2d3436; font-size: 28px; margin-bottom: 10px; }
    .header p { color: #636e72; font-size: 14px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.04);
    }
    .stat-value { font-size: 36px; font-weight: 700; color: #667eea; margin-bottom: 8px; }
    .stat-label { font-size: 13px; color: #636e72; font-weight: 500; }
    .section {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #2d3436;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-secondary { background: #95a5a6; color: white; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }
    .data-table th, .data-table td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #e9ecef;
    }
    .data-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #2d3436;
      font-size: 13px;
    }
    .data-table td { font-size: 14px; color: #636e72; }
    .data-table tr:hover { background: #f8f9fa; }
    .badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-boy { background: #e3f2fd; color: #1565c0; }
    .badge-girl { background: #fce4ec; color: #c2185b; }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }
    .chart-container {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .log-output {
      background: #2d3436;
      color: #2ecc71;
      padding: 20px;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 15px;
    }
    .action-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      .stats-grid, .chart-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 数据库管理后台</h1>
      <p>儿童身高评估系统 - 数据持久化管理</p>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statUsers">0</div>
        <div class="stat-label">总用户数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statRecords">0</div>
        <div class="stat-label">测评记录</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statToday">0</div>
        <div class="stat-label">今日测评</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSize">0 KB</div>
        <div class="stat-label">存储大小</div>
      </div>
    </div>

    <!-- 操作栏 -->
    <div class="section">
      <div class="section-title">⚙️ 数据操作</div>
      <div class="action-bar">
        <button class="btn btn-primary" onclick="refreshData()">🔄 刷新数据</button>
        <button class="btn btn-success" onclick="exportData()">📥 导出数据</button>
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📤 导入数据</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn btn-danger" onclick="cleanupData()">🧹 清理过期数据</button>
        <button class="btn btn-danger" onclick="resetDatabase()">⚠️ 重置数据库</button>
      </div>
      <div class="log-output" id="logOutput">
        > 系统就绪...
      </div>
    </div>

    <!-- 用户列表 -->
    <div class="section">
      <div class="section-title">👥 用户列表</div>
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>手机号</th>
            <th>昵称</th>
            <th>测评次数</th>
            <th>注册时间</th>
            <th>最近测评</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="6" style="text-align:center;color:#999;">暂无数据</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 最近记录 -->
    <div class="section">
      <div class="section-title">📋 最近测评记录</div>
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>姓名</th>
            <th>性别</th>
            <th>年龄</th>
            <th>身高</th>
            <th>百分位</th>
            <th>测评时间</th>
          </tr>
        </thead>
        <tbody id="recordsTable">
          <tr><td colspan="7" style="text-align:center;color:#999;">暂无数据</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 图表 -->
    <div class="chart-grid">
      <div class="chart-container">
        <h3 style="margin-bottom:15px;color:#2d3436;">📈 近 7 日测评趋势</h3>
        <canvas id="trendChart"></canvas>
      </div>
      <div class="chart-container">
        <h3 style="margin-bottom:15px;color:#2d3436;">👦 性别分布</h3>
        <canvas id="genderChart"></canvas>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script>
    let trendChart = null;
    let genderChart = null;

    // 日志输出
    function log(message) {
      const output = document.getElementById('logOutput');
      const time = new Date().toLocaleTimeString('zh-CN');
      output.innerHTML += `\n> [${time}] ${message}`;
      output.scrollTop = output.scrollHeight;
    }

    // 刷新数据
    function refreshData() {
      if (typeof db === 'undefined') {
        log('❌ 数据库未加载');
        return;
      }

      const info = db.getInfo();
      const analytics = db.getAnalytics();
      const users = db.getAllUsers();
      const records = db.getRecords({ pageSize: 10 });

      // 更新统计
      document.getElementById('statUsers').textContent = analytics.totalUsers;
      document.getElementById('statRecords').textContent = analytics.totalRecords;
      document.getElementById('statToday').textContent = analytics.todayCount;
      document.getElementById('statSize').textContent = (info.size / 1024).toFixed(2) + ' KB';

      // 更新用户列表
      const usersTbody = document.getElementById('usersTable');
      if (users.length === 0) {
        usersTbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">暂无数据</td></tr>';
      } else {
        usersTbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.id.substring(0, 8)}...</td>
            <td>${u.phone}</td>
            <td>${u.name}</td>
            <td>${u.assessmentCount || 0}</td>
            <td>${new Date(u.createdAt).toLocaleString('zh-CN')}</td>
            <td>${u.lastAssessmentAt ? new Date(u.lastAssessmentAt).toLocaleString('zh-CN') : '-'}</td>
          </tr>
        `).join('');
      }

      // 更新记录列表
      const recordsTbody = document.getElementById('recordsTable');
      if (records.records.length === 0) {
        recordsTbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;">暂无数据</td></tr>';
      } else {
        recordsTbody.innerHTML = records.records.map(r => `
          <tr>
            <td>${r.id.substring(0, 8)}...</td>
            <td>${r.childName}</td>
            <td><span class="badge ${r.gender === 'boy' ? 'badge-boy' : 'badge-girl'}">${r.gender === 'boy' ? '男孩' : '女孩'}</span></td>
            <td>${r.age}岁</td>
            <td>${r.height}cm</td>
            <td>P${r.percentile}</td>
            <td>${new Date(r.createdAt).toLocaleString('zh-CN')}</td>
          </tr>
        `).join('');
      }

      // 更新图表
      renderCharts(analytics);

      log(`✅ 数据已刷新 - 用户：${users.length}, 记录：${records.records.length}`);
    }

    // 渲染图表
    function renderCharts(analytics) {
      // 趋势图
      const trendCtx = document.getElementById('trendChart').getContext('2d');
      if (trendChart) trendChart.destroy();
      trendChart = new Chart(trendCtx, {
        type: 'line',
        data: {
          labels: analytics.last7Days.map(d => d.date),
          datasets: [{
            label: '测评次数',
            data: analytics.last7Days.map(d => d.count),
            borderColor: '#667eea',
            backgroundColor: 'rgba(102, 126, 234, 0.1)',
            borderWidth: 3,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
        }
      });

      // 性别图
      const genderCtx = document.getElementById('genderChart').getContext('2d');
      if (genderChart) genderChart.destroy();
      genderChart = new Chart(genderCtx, {
        type: 'doughnut',
        data: {
          labels: ['男孩', '女孩'],
          datasets: [{
            data: [analytics.genderDistribution.boy, analytics.genderDistribution.girl],
            backgroundColor: ['#3498db', '#e91e63']
          }]
        },
        options: { responsive: true }
      });
    }

    // 导出数据
    function exportData() {
      if (typeof db === 'undefined') { log('❌ 数据库未加载'); return; }
      const data = db.exportData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `height_db_export_${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      log('✅ 数据已导出');
    }

    // 导入数据
    function importData(event) {
      if (typeof db === 'undefined') { log('❌ 数据库未加载'); return; }
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (db.importData(data)) {
            log('✅ 数据已导入');
            refreshData();
          } else {
            log('❌ 导入失败');
          }
        } catch (err) {
          log('❌ 文件格式错误：' + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // 清理数据
    function cleanupData() {
      if (typeof db === 'undefined') { log('❌ 数据库未加载'); return; }
      if (!confirm('确定要清理过期数据吗？')) return;
      const result = db.cleanupExpiredData();
      log(`✅ 已清理 ${result.deleted} 条记录，剩余 ${result.remaining} 条`);
      refreshData();
    }

    // 重置数据库
    function resetDatabase() {
      if (typeof db === 'undefined') { log('❌ 数据库未加载'); return; }
      if (!confirm('⚠️ 警告：此操作将删除所有数据！确定继续吗？')) return;
      db.reset();
      log('✅ 数据库已重置');
      refreshData();
    }

    // 页面加载
    window.addEventListener('load', function() {
      log('🚀 数据库管理后台已加载');
      if (typeof db !== 'undefined') {
        log('✅ 数据库模块已就绪');
        log('📊 ' + JSON.stringify(db.getInfo()));
        refreshData();
      } else {
        log('❌ 数据库模块加载失败');
      }
    });
  </script>
</body>
</html>
