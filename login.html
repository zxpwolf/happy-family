<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Happy Family 儿童身高评估</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.25);
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      font-size: 64px;
      margin-bottom: 15px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: #2d3436;
      margin-bottom: 10px;
    }

    .login-subtitle {
      font-size: 15px;
      color: #636e72;
    }

    .login-form .form-group {
      margin-bottom: 25px;
    }

    .login-form label {
      display: block;
      margin-bottom: 10px;
      color: #2d3436;
      font-weight: 600;
      font-size: 14px;
    }

    .login-form input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      font-size: 16px;
      transition: all 0.3s;
    }

    .login-form input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .login-form input::placeholder {
      color: #b2bec3;
    }

    .login-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.35);
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.45);
    }

    .login-btn:active {
      transform: translateY(-1px);
    }

    .login-divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .login-divider span {
      padding: 0 15px;
      color: #b2bec3;
      font-size: 13px;
    }

    .guest-login {
      width: 100%;
      padding: 16px;
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .guest-login:hover {
      background: #667eea;
      color: white;
    }

    .login-footer {
      text-align: center;
      margin-top: 30px;
      font-size: 13px;
      color: #b2bec3;
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">👨‍👩‍👧</div>
      <h1 class="login-title">Happy Family</h1>
      <p class="login-subtitle">儿童身高评估系统</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11" required>
      </div>

      <div class="form-group">
        <label>验证码</label>
        <input type="text" id="code" placeholder="请输入验证码" maxlength="6" required>
      </div>

      <button type="submit" class="login-btn">登录</button>

      <div class="login-divider">
        <span>或者</span>
      </div>

      <button type="button" class="guest-login" onclick="guestLogin()">
        游客体验
      </button>
    </form>

    <div class="login-footer">
      登录即代表您同意《用户协议》和《隐私政策》
    </div>
  </div>

  <script>
    // 处理登录
    function handleLogin(event) {
      event.preventDefault();
      
      const phone = document.getElementById('phone').value.trim();
      const code = document.getElementById('code').value.trim();
      
      if (!phone || phone.length !== 11) {
        showError('请输入正确的手机号');
        return;
      }
      
      if (!code || code.length !== 6) {
        showError('请输入 6 位验证码');
        return;
      }
      
      // 模拟登录（实际项目需要对接短信验证）
      const user = {
        phone: phone,
        name: phone.substring(0, 3) + '****' + phone.substring(7),
        loginTime: new Date().toISOString()
      };
      
      // 保存到数据库
      if (typeof db !== 'undefined') {
        db.upsertUser({ phone: phone, name: user.name });
      }
      
      // 保存登录状态
      localStorage.setItem('currentUser', JSON.stringify(user));
      
      // 跳转到宝贝信息页面
      window.location.href = 'baby-info.html';
    }

    // 游客登录
    function guestLogin() {
      const user = {
        phone: 'guest',
        name: '游客用户',
        isGuest: true,
        loginTime: new Date().toISOString()
      };
      
      localStorage.setItem('currentUser', JSON.stringify(user));
      window.location.href = 'baby-info.html';
    }

    // 显示错误信息
    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => {
        errorEl.classList.remove('show');
      }, 3000);
    }

    // 检查是否已登录
    window.addEventListener('load', function() {
      const user = localStorage.getItem('currentUser');
      if (user) {
        // 已登录，直接跳转到宝贝信息页面
        window.location.href = 'baby-info.html';
      }
    });
  </script>
</body>
</html>
